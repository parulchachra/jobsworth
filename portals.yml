# Portal Scanner Configuration — Parul Chachra
# Healthcare AI Product & Growth roles

title_filter:
  positive:
    # -- Product roles --
    - "Product Manager"
    - "Head of Product"
    - "VP of Product"
    - "Director of Product"
    - "Chief Product Officer"
    - "CPO"
    - "Technical PM"
    - "Product Lead"
    # -- Growth roles --
    - "Growth Product"
    - "Head of Growth"
    - "VP Growth"
    - "Growth Manager"
    - "Product Growth"
    # -- AI/ML qualifier keywords (combine with above) --
    - "AI"
    - "ML"
    - "GenAI"
    - "Generative AI"
    - "LLM"
    - "Clinical AI"
    - "Healthcare AI"
    - "Digital Health"
    - "Health Tech"
    # -- Healthcare specific --
    - "Care Management"
    - "Care Coordination"
    - "Population Health"
    - "Clinical Workflow"
    - "EHR"
    - "Health Equity"
    - "Value-Based Care"
    - "Remote Patient Monitoring"
    - "Clinical Decision Support"
  negative:
    - "Junior"
    - "Associate PM"
    - "Intern"
    - "VP of Engineering"
    - "Staff Engineer"
    - "Data Scientist"
    - "Software Engineer"
    - "SWE"
    - "iOS"
    - "Android"
    - "Frontend"
    - "Backend"
    - "DevOps"
    - "SRE"
    - "Salesforce Admin"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Gaming"
    - "E-commerce"
  seniority_boost:
    - "Senior"
    - "Lead"
    - "Staff"
    - "Principal"
    - "Director"
    - "Head"
    - "VP"
    - "Group"

# -- Search queries --

search_queries:

  # -- Senior PM --
  - name: Greenhouse — Senior PM Healthcare AI
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Senior Product Manager" "healthcare AI" OR "clinical AI" OR "digital health" remote'
    enabled: true

  - name: Ashby — Senior PM Healthcare AI
    query: 'site:jobs.ashbyhq.com "Senior Product Manager" "healthcare" OR "clinical" OR "health tech" AI remote'
    enabled: true

  - name: Lever — Senior PM Healthcare AI
    query: 'site:jobs.lever.co "Senior Product Manager" "healthcare AI" OR "digital health" OR "clinical AI" remote'
    enabled: true

  # -- Director / Head of Product --
  - name: Greenhouse — Director Head of Product Health
    query: 'site:boards.greenhouse.io "Director of Product" OR "Head of Product" "healthcare" OR "health tech" OR "digital health" AI remote'
    enabled: true

  - name: Ashby — Director Head of Product Health
    query: 'site:jobs.ashbyhq.com "Director of Product" OR "Head of Product" "healthcare" OR "clinical" AI'
    enabled: true

  # -- Broad PM (Senior + Director combined) --
  - name: Greenhouse — Healthcare AI PM (Senior or Director)
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Product Manager" "healthcare AI" OR "clinical AI" OR "digital health" remote'
    enabled: true

  # -- Growth PM --
  - name: Greenhouse — Growth PM Healthcare
    query: 'site:boards.greenhouse.io "Growth Product Manager" OR "Head of Growth" "healthcare" OR "digital health" OR "health tech"'
    enabled: true

  - name: Ashby — Growth PM Healthcare
    query: 'site:jobs.ashbyhq.com "Growth" "Product Manager" OR "Head of Growth" "healthcare" OR "digital health"'
    enabled: true

  # -- Broad healthcare AI PM search --
  - name: LinkedIn / Wellfound — Healthcare AI PM
    query: '"Product Manager" "healthcare AI" OR "clinical AI" OR "care management" OR "health equity" remote site:wellfound.com OR site:linkedin.com/jobs'
    enabled: true

  - name: YC Jobs — Digital Health PM
    query: 'site:workatastartup.com "Product Manager" "digital health" OR "healthcare AI" OR "clinical" remote'
    enabled: true

  - name: Himalayas — Healthcare AI PM
    query: 'site:himalayas.app "Product Manager" "healthcare" OR "digital health" OR "clinical AI" remote'
    enabled: true

  - name: HN Who's Hiring — Healthcare AI PM
    query: 'site:news.ycombinator.com "Product Manager" "healthcare AI" OR "health tech" OR "digital health" remote'
    enabled: true

  - name: WeWorkRemotely — Digital Health PM
    query: 'site:weworkremotely.com "Product Manager" "healthcare" OR "digital health" OR "AI"'
    enabled: true

